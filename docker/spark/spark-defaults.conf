# Tell Spark to use the Hive catalog implementation. With this on, the
# SparkSession picks up hive-site.xml from HADOOP_CONF_DIR and routes
# `df.write.saveAsTable(...)` / `spark.sql("CREATE TABLE ...")` through HMS.
spark.sql.catalogImplementation  hive

# Warehouse path for managed tables. MUST agree with metastore.warehouse.dir
# in docker/hive-metastore/metastore-site.xml or saveAsTable writes Parquet
# to one place and HMS records another.
spark.sql.warehouse.dir          hdfs://namenode:9000/warehouse
