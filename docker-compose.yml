name: finpulse

# Local stack for FinPulse Fraud project.
#   HDFS  : NameNode + 2 DataNodes  (UI :9870)
#   Spark : Master + 2 Workers      (UI :8080,  master rpc :7077)
#   Kafka : single broker, KRaft    (host :9092, internal kafka:9094)
#   Kafdrop                          (UI :9001)
#   Airflow + Postgres              (UI :8081  user/pass admin/admin)
#
# All images are multi-arch (work on Apple Silicon).

networks:
  finpulse:
    driver: bridge

volumes:
  hdfs-name:
  hdfs-data-1:
  hdfs-data-2:
  kafka-data:
  postgres-data:
  # Pinot + Superset (analytics layer)
  pinot-zk-data:
  pinot-zk-datalog:
  pinot-controller-data:
  pinot-server-data:
  superset-data:
  # Flink (stream processing layer)
  flink-data:
  # Hive Metastore (DWH catalog layer)
  metastore-db-data:

# -----------------------------------------------------------------------------
# Shared blocks
# -----------------------------------------------------------------------------

# Hadoop config is delivered via bind-mounted XML files in
# ./docker/hadoop-server (server side: NN + DNs) and ./docker/hadoop-client
# (Spark workers). We do NOT use the apache/hadoop env-var-to-XML translator
# because farberg/apache-hadoop:3.4.1 ships without it, and we want one
# config story across both images.

x-airflow-common: &airflow-common
  image: apache/airflow:2.10.4-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: dev-secret-key-change-me
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./jobs:/opt/jobs:ro
  user: "50000:0"
  networks: [finpulse]

# -----------------------------------------------------------------------------
# Services
# -----------------------------------------------------------------------------

services:

  # ---------- HDFS ----------------------------------------------------------
  # NOTE on image choice (farberg/apache-hadoop vs apache/hadoop):
  #   The official `apache/hadoop` image is amd64-only — Apache does not
  #   publish arm64 builds for any tag. Running it on Apple Silicon forces
  #   Rosetta/QEMU emulation which slows the JVM ~30-50%. `farberg/apache-hadoop`
  #   is a community fork that rebuilds the *same* upstream Hadoop release
  #   natively for arm64 + amd64; it inherits the `apache/hadoop` entrypoint
  #   and env-var -> XML config translator, so HDFS-SITE.XML_* env vars work
  #   identically. Pinned to 3.4.1 because that is the closest multi-arch tag
  #   to what `apache/hadoop:3.3.6` would have given us.
  #   Trade-off: community image, single maintainer. Acceptable for a class
  #   project; revisit if Apache ever publishes arm64 hadoop builds.
  namenode:
    image: farberg/apache-hadoop:3.4.1
    container_name: namenode
    hostname: namenode
    user: root
    command:
      - bash
      - -c
      - |
        if [ ! -d /hadoop/dfs/name/current ]; then
          echo "Formatting NameNode..."
          hdfs namenode -format -nonInteractive -clusterId finpulse
        fi
        exec hdfs namenode
    ports:
      - "9870:9870"   # NameNode web UI
      - "9000:9000"   # NameNode RPC
    volumes:
      - hdfs-name:/hadoop/dfs/name
      - ./docker/hadoop-server/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./docker/hadoop-server/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
      - ./docker/hadoop-server/log4j.properties:/opt/hadoop/etc/hadoop/log4j.properties:ro
    networks: [finpulse]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9870/ > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  datanode-1:
    image: farberg/apache-hadoop:3.4.1
    container_name: datanode-1
    hostname: datanode-1
    user: root
    command: ["hdfs", "datanode"]
    depends_on:
      namenode:
        condition: service_healthy
    volumes:
      - hdfs-data-1:/hadoop/dfs/data
      - ./docker/hadoop-server/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./docker/hadoop-server/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
      - ./docker/hadoop-server/log4j.properties:/opt/hadoop/etc/hadoop/log4j.properties:ro
    networks: [finpulse]

  datanode-2:
    image: farberg/apache-hadoop:3.4.1
    container_name: datanode-2
    hostname: datanode-2
    user: root
    command: ["hdfs", "datanode"]
    depends_on:
      namenode:
        condition: service_healthy
    volumes:
      - hdfs-data-2:/hadoop/dfs/data
      - ./docker/hadoop-server/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./docker/hadoop-server/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
      - ./docker/hadoop-server/log4j.properties:/opt/hadoop/etc/hadoop/log4j.properties:ro
    networks: [finpulse]

  # ---------- Spark ---------------------------------------------------------
  # apache/spark images are bare-bones: we provide explicit master/worker
  # commands instead of relying on Bitnami's init script.
  spark-master:
    image: apache/spark:3.5.3-python3
    container_name: spark-master
    hostname: spark-master
    user: root              # write events / logs under mounted volumes
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    environment:
      - HADOOP_CONF_DIR=/opt/hadoop-conf
      - SPARK_NO_DAEMONIZE=true
    ports:
      - "8080:8080"   # Master UI
      - "7077:7077"   # Master RPC
    volumes:
      - ./jobs:/opt/jobs
      - ./docker/hadoop-client:/opt/hadoop-conf:ro
      - ./docker/spark/log4j2.properties:/opt/spark/conf/log4j2.properties:ro
      - ./docker/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    networks: [finpulse]

  spark-worker-1:
    image: apache/spark:3.5.3-python3
    container_name: spark-worker-1
    hostname: spark-worker-1
    user: root
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - --cores
      - "2"
      - --memory
      - 2g
      - --webui-port
      - "8081"
      - spark://spark-master:7077
    environment:
      - HADOOP_CONF_DIR=/opt/hadoop-conf
      - SPARK_NO_DAEMONIZE=true
    depends_on: [spark-master]
    volumes:
      - ./jobs:/opt/jobs
      - ./docker/hadoop-client:/opt/hadoop-conf:ro
      - ./docker/spark/log4j2.properties:/opt/spark/conf/log4j2.properties:ro
      - ./docker/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    networks: [finpulse]

  spark-worker-2:
    image: apache/spark:3.5.3-python3
    container_name: spark-worker-2
    hostname: spark-worker-2
    user: root
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - --cores
      - "2"
      - --memory
      - 2g
      - --webui-port
      - "8081"
      - spark://spark-master:7077
    environment:
      - HADOOP_CONF_DIR=/opt/hadoop-conf
      - SPARK_NO_DAEMONIZE=true
    depends_on: [spark-master]
    volumes:
      - ./jobs:/opt/jobs
      - ./docker/hadoop-client:/opt/hadoop-conf:ro
      - ./docker/spark/log4j2.properties:/opt/spark/conf/log4j2.properties:ro
      - ./docker/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    networks: [finpulse]

  # ---------- Kafka ---------------------------------------------------------
  # Official apache/kafka image: env vars are KAFKA_<KEY> (no _CFG_ infix).
  # Single-broker KRaft, so internal topic replication factors must be 1.
  kafka:
    image: apache/kafka:3.7.1
    container_name: kafka
    hostname: kafka
    user: "0:0"     # let entrypoint chown the named volume on first boot
    ports:
      - "9092:9092"   # external client (host)
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=INTERNAL://:9094,CONTROLLER://:9093,EXTERNAL://:9092
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:9094,EXTERNAL://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
      # Single-broker safety: replication/ISR must be 1 or topics fail to create.
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      # CLUSTER_ID is auto-generated on first format if unset.
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks: [finpulse]
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:9094 > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  kafdrop:
    # 4.0.1 ships amd64 only; :latest is multi-arch (last verified Apr 2026).
    # Pin to a digest if you need reproducibility.
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop
    ports:
      - "9001:9000"   # UI on host :9001 (9000 is taken by HDFS RPC)
    environment:
      KAFKA_BROKERCONNECT: kafka:9094
    depends_on:
      kafka:
        condition: service_healthy
    networks: [finpulse]

  # ---------- Airflow -------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 10
    networks: [finpulse]

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@finpulse.local || true
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ---------- Pinot ---------------------------------------------------------
  # Apache Pinot is a real-time OLAP store. It can ingest from Kafka (real-time
  # tables) and from HDFS Parquet (offline tables) and answer SQL queries in
  # tens of milliseconds. We run the standard 3-component layout:
  #   pinot-controller : cluster mgmt + REST API + UI
  #   pinot-broker     : query routing
  #   pinot-server     : segment storage + query execution
  # Plus a dedicated Zookeeper because Pinot uses ZK for cluster state.
  # (Kafka has migrated to KRaft and no longer needs ZK; this is a separate
  # ZK instance that only Pinot talks to. Sharing a ZK across Pinot + Kafka
  # is possible but couples lifecycles in ways that are awkward at this
  # scale, so we run our own.)
  pinot-zookeeper:
    image: zookeeper:3.9
    container_name: pinot-zookeeper
    hostname: pinot-zookeeper
    environment:
      # Whitelist the `ruok` 4-letter word so the healthcheck below works.
      # Default is restricted in 3.5+ for security; safe to enable in dev.
      - ZOO_4LW_COMMANDS_WHITELIST=ruok,stat,conf
    volumes:
      - pinot-zk-data:/data
      - pinot-zk-datalog:/datalog
    networks: [finpulse]
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep -q imok"]
      interval: 10s
      timeout: 5s
      retries: 12

  # apachepinot/pinot:1.2.0 is multi-arch (arm64 + amd64).
  # Image entrypoint is bin/pinot-admin.sh; `command:` provides the subcommand
  # + args. JAVA_OPTS keeps the JVM heap modest so all four Pinot containers
  # together don't blow past a 16 GB Docker allocation.
  pinot-controller:
    image: apachepinot/pinot:1.2.0
    container_name: pinot-controller
    hostname: pinot-controller
    command:
      - StartController
      - -zkAddress
      - pinot-zookeeper:2181
      - -clusterName
      - finpulse
      - -controllerHost
      - pinot-controller
      - -controllerPort
      - "9000"
      - -dataDir
      - /var/pinot/controller/data
    environment:
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC
    ports:
      # Pinot Controller defaults to 9000, which collides with the HDFS
      # NameNode RPC port on the host. Remap host -> 9100 (same trick we
      # already use for Kafdrop, host 9001 -> container 9000).
      - "9100:9000"
    volumes:
      - pinot-controller-data:/var/pinot/controller/data
    depends_on:
      pinot-zookeeper:
        condition: service_healthy
    networks: [finpulse]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/health | grep -q OK"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  pinot-broker:
    image: apachepinot/pinot:1.2.0
    container_name: pinot-broker
    hostname: pinot-broker
    command:
      - StartBroker
      - -zkAddress
      - pinot-zookeeper:2181
      - -clusterName
      - finpulse
      - -brokerHost
      - pinot-broker
      - -brokerPort
      - "8099"
    environment:
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC
    ports:
      - "8099:8099"   # Broker query API (used by Superset + smoke checks)
    depends_on:
      pinot-controller:
        condition: service_healthy
    networks: [finpulse]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8099/health | grep -q OK"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  pinot-server:
    image: apachepinot/pinot:1.2.0
    container_name: pinot-server
    hostname: pinot-server
    command:
      - StartServer
      - -zkAddress
      - pinot-zookeeper:2181
      - -clusterName
      - finpulse
      - -serverHost
      - pinot-server
      - -serverPort
      - "8098"
      - -serverAdminPort
      - "8097"
      - -dataDir
      - /var/pinot/server/data/index
      - -segmentDir
      - /var/pinot/server/data/segment
    environment:
      # Servers hold segment data in memory + execute queries; give them a
      # bit more heap than controller/broker.
      - JAVA_OPTS=-Xms512m -Xmx1g -XX:+UseG1GC
    volumes:
      - pinot-server-data:/var/pinot/server/data
    # No host port — the broker is the only Pinot component external clients
    # talk to. Server ports 8097/8098 are in-network only.
    depends_on:
      pinot-controller:
        condition: service_healthy
    networks: [finpulse]

  # ---------- Superset ------------------------------------------------------
  # Apache Superset is the BI / dashboard UI. It connects to Pinot via the
  # `pinotdb` SQLAlchemy driver, which we install at container startup by
  # bind-mounting requirements-local.txt at the path the official entrypoint
  # already pip-installs from. This lets us avoid baking a custom Dockerfile.
  #
  # Two-container split mirrors the Airflow init/webserver pattern:
  #   superset-init  : one-shot — db upgrade, create admin user, run init.
  #   superset       : long-lived gunicorn web server.
  #
  # Metadata DB is SQLite on the `superset-data` named volume. Fine for a
  # single-user class project; swap to Postgres if multi-user editing is
  # ever needed (see superset_config.py for the URI to change).
  # Superset 4.1.1 dropped /app/docker/{docker-init,docker-bootstrap}.sh from the
  # published image (those scripts only exist in the upstream source repo). We
  # bring our own minimal versions in docker/superset/ and bind-mount them.
  superset-init:
    image: apache/superset:4.1.1
    container_name: superset-init
    user: "root"      # need root to pip-install requirements-local.txt
    command: ["/app/superset-init.sh"]
    environment:
      - SUPERSET_SECRET_KEY=dev-secret-change-me
      - SUPERSET_LOAD_EXAMPLES=no
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin
      - ADMIN_FIRSTNAME=Admin
      - ADMIN_LASTNAME=User
      - ADMIN_EMAIL=admin@finpulse.local
    volumes:
      - superset-data:/app/superset_home
      - ./docker/superset/requirements-local.txt:/app/docker/requirements-local.txt:ro
      - ./docker/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./docker/superset/superset-init.sh:/app/superset-init.sh:ro
    networks: [finpulse]
    restart: "no"

  superset:
    image: apache/superset:4.1.1
    container_name: superset
    user: "root"
    command: ["/app/superset-bootstrap.sh"]
    environment:
      - SUPERSET_SECRET_KEY=dev-secret-change-me
      - SUPERSET_LOAD_EXAMPLES=no
    ports:
      - "8088:8088"   # BI web UI
    volumes:
      - superset-data:/app/superset_home
      - ./docker/superset/requirements-local.txt:/app/docker/requirements-local.txt:ro
      - ./docker/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./docker/superset/superset-bootstrap.sh:/app/superset-bootstrap.sh:ro
    depends_on:
      superset-init:
        condition: service_completed_successfully
    networks: [finpulse]
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s   # gunicorn cold start + pip-install pinotdb on first run
    restart: unless-stopped

  # ---------- Flink --------------------------------------------------------
  # Apache Flink — stream processor for the Kafka → Flink → Kafka layer
  # (Step 8 in plan.md). Distinct from Spark Structured Streaming because
  # Flink is event-time native, true-streaming (not micro-batch), and gives
  # exactly-once via two-phase commit with Kafka. See
  # docs/odsc/robinhood_infrastructure.md for the full rationale.
  #
  # Topology: 1 jobmanager + 1 taskmanager. The taskmanager exposes 4 slots
  # so a keyed velocity window can run with parallelism > 1 without
  # back-pressuring the source.
  #
  # Port note: Flink's UI defaults to 8081 — collides with Airflow web.
  # Remap to host 8082, mirroring the Kafdrop (9001<-9000) and Pinot
  # Controller (9100<-9000) port-collision precedents.
  flink-jobmanager:
    image: flink:1.19.1-scala_2.12-java11
    container_name: flink-jobmanager
    hostname: flink-jobmanager
    command: jobmanager
    environment:
      # Multi-line env value: FLINK_PROPERTIES is appended to flink-conf.yaml
      # by the image entrypoint. jobmanager.rpc.address must resolve from
      # taskmanager containers, so use the docker hostname not localhost.
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.address: flink-jobmanager
        rest.bind-address: 0.0.0.0
        execution.checkpointing.interval: 30000
        state.backend: rocksdb
        state.checkpoints.dir: file:///opt/flink/data/checkpoints
        state.savepoints.dir: file:///opt/flink/data/savepoints
    ports:
      - "8082:8081"   # Flink web UI (8081 is Airflow's)
    volumes:
      - flink-data:/opt/flink/data
      - ./src/consumer:/opt/flink/usrlib:ro    # job artifacts (Step 8)
      - ./docker/hadoop-client:/opt/hadoop-conf:ro   # HDFS client config
    depends_on:
      kafka:
        condition: service_healthy
    networks: [finpulse]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/overview > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  flink-taskmanager:
    image: flink:1.19.1-scala_2.12-java11
    container_name: flink-taskmanager
    hostname: flink-taskmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.host: flink-taskmanager
        taskmanager.numberOfTaskSlots: 4
        state.backend: rocksdb
        state.checkpoints.dir: file:///opt/flink/data/checkpoints
        state.savepoints.dir: file:///opt/flink/data/savepoints
    volumes:
      - flink-data:/opt/flink/data
      - ./src/consumer:/opt/flink/usrlib:ro
      - ./docker/hadoop-client:/opt/hadoop-conf:ro
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    networks: [finpulse]

  # ---------- Hive Metastore (DWH catalog layer) --------------------------
  # The Hive Metastore (HMS) is a Thrift service that stores table metadata
  # (schemas, partitions, locations) in a relational backing store. It does
  # NOT store any actual data — Parquet bytes still live in HDFS. The
  # lakehouse pattern decouples three concerns:
  #   - storage   : HDFS  (where Parquet bytes live)
  #   - metadata  : HMS   (what tables exist, what columns, where they point)
  #   - engines   : Spark + Presto (read both pieces independently)
  #
  # Topology:
  #   metastore-db          : dedicated Postgres for the HMS catalog. Kept
  #                           separate from Airflow's Postgres so `make nuke`
  #                           on one doesn't silently nuke the other's data.
  #   hive-metastore-init   : one-shot, idempotent — runs schematool only
  #                           if the schema doesn't already exist. Mirrors
  #                           the airflow-init / superset-init pattern.
  #   hive-metastore        : long-running Thrift server on :9083 (in-network
  #                           only — only Spark + Presto need it).
  #
  # Image: apache/hive:4.0.0 is multi-arch (amd64 + arm64). The official
  # `4.0.0-standalone-metastore` tag does NOT exist; the full image runs in
  # metastore-only mode via SERVICE_NAME=metastore + IS_RESUME=true.
  #
  # JDBC driver: apache/hive does not bundle the Postgres driver. Run
  # `make hive-deps` once on the host to download postgresql-42.7.2.jar
  # into ./docker/hive-metastore/jars/ (gitignored). Same posture as the
  # Spark Kafka connector (`--packages` at submit time): fetch deps on
  # demand, don't bake images.
  metastore-db:
    image: postgres:16-alpine
    container_name: metastore-db
    hostname: metastore-db
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
      POSTGRES_DB: metastore
    volumes:
      - metastore-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "hive"]
      interval: 5s
      retries: 10
    networks: [finpulse]

  hive-metastore-init:
    image: apache/hive:4.0.0
    container_name: hive-metastore-init
    user: root
    entrypoint:
      - bash
      - -c
      - |
        set -e
        # Sanity: postgres JDBC driver must be present on the host.
        if ! ls /opt/hive/jdbc/postgresql-*.jar > /dev/null 2>&1; then
          echo "ERROR: postgres JDBC driver missing in ./docker/hive-metastore/jars/"
          echo "       Run 'make hive-deps' on the host to download it."
          exit 1
        fi
        # Stage the driver into Hive's classpath.
        cp /opt/hive/jdbc/postgresql-*.jar /opt/hive/lib/
        # Idempotent schema init: only run schematool if the catalog is empty.
        if /opt/hive/bin/schematool -dbType postgres -info > /dev/null 2>&1; then
          echo "HMS schema already initialized — skipping schematool"
        else
          echo "Initializing HMS schema in metastore-db..."
          /opt/hive/bin/schematool -dbType postgres -initSchema --verbose
        fi
        # Ensure the HDFS warehouse root exists (matches metastore.warehouse.dir).
        export HADOOP_CONF_DIR=/opt/hadoop-conf
        /opt/hadoop/bin/hdfs dfs -mkdir -p /warehouse 2>/dev/null || \
          /opt/hive/bin/hadoop fs -mkdir -p /warehouse 2>/dev/null || true
        echo "HMS init complete."
    environment:
      HADOOP_CONF_DIR: /opt/hadoop-conf
    volumes:
      - ./docker/hive-metastore/metastore-site.xml:/opt/hive/conf/metastore-site.xml:ro
      - ./docker/hive-metastore/jars:/opt/hive/jdbc:ro
      - ./docker/hadoop-client:/opt/hadoop-conf:ro
    depends_on:
      metastore-db:
        condition: service_healthy
      namenode:
        condition: service_healthy
    networks: [finpulse]
    restart: "no"

  hive-metastore:
    image: apache/hive:4.0.0
    container_name: hive-metastore
    hostname: hive-metastore
    user: root
    entrypoint:
      - bash
      - -c
      - |
        set -e
        # Stage postgres JDBC driver (host directory bind-mounted at /opt/hive/jdbc).
        cp /opt/hive/jdbc/postgresql-*.jar /opt/hive/lib/
        # Delegate to the image's original entrypoint, which honours
        # SERVICE_NAME=metastore + IS_RESUME=true to skip schematool.
        exec /entrypoint.sh
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      IS_RESUME: "true"
      HADOOP_CONF_DIR: /opt/hadoop-conf
    volumes:
      - ./docker/hive-metastore/metastore-site.xml:/opt/hive/conf/metastore-site.xml:ro
      - ./docker/hive-metastore/jars:/opt/hive/jdbc:ro
      - ./docker/hadoop-client:/opt/hadoop-conf:ro
    depends_on:
      hive-metastore-init:
        condition: service_completed_successfully
    networks: [finpulse]
    healthcheck:
      # HMS exposes Thrift on 9083 — no HTTP endpoint, so just probe TCP.
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9083' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ---------- PrestoDB coordinator (DWH query engine) ---------------------
  # PrestoDB is a distributed SQL engine that reads HDFS Parquet via the
  # Hive connector + Hive Metastore. It serves the *granular* layer next to
  # Pinot's pre-aggregated streaming layer — same lakehouse, different access
  # pattern.
  #
  # Single-node "coordinator + embedded worker" via:
  #   coordinator=true
  #   node-scheduler.include-coordinator=true
  # Production deployments split coordinator from workers.
  #
  # Image: prestodb/presto:0.292 — multi-arch (amd64 + arm64). On arm64 the
  # JVM prints "Support for the ARM architecture is experimental" — advisory,
  # not a failure. (Trino has stronger arm64 support; revisit if perf matters.)
  #
  # Connector name is `hive-hadoop2` in PrestoDB (Trino renamed it to `hive`).
  # See docker/presto/etc/catalog/hive.properties.
  #
  # Port: host 8086 -> container 8080. (8080 is taken by Spark Master UI;
  # the in-network port stays 8080 because Superset, presto-cli, and the
  # discovery URI all default to it.)
  presto-coordinator:
    image: prestodb/presto:0.292
    container_name: presto-coordinator
    hostname: presto-coordinator
    ports:
      - "8086:8080"
    environment:
      # Java attach API: required by Presto's spill-to-disk machinery.
      JAVA_TOOL_OPTIONS: -Djdk.attach.allowAttachSelf=true
    volumes:
      # Our config replaces the image's default etc/ directory wholesale.
      - ./docker/presto/etc:/opt/presto-server/etc:ro
      # HDFS client config: same XML mounted into Spark master/workers.
      # hive.properties references /etc/hadoop/conf/{core,hdfs}-site.xml.
      - ./docker/hadoop-client:/etc/hadoop/conf:ro
    depends_on:
      hive-metastore:
        condition: service_started
      namenode:
        condition: service_healthy
    networks: [finpulse]
    healthcheck:
      # /v1/info returns {"starting": false, ...} once the cluster has loaded
      # all catalogs and is ready to accept queries.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/v1/info | grep -q '\"starting\":false'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
