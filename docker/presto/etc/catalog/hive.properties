# PrestoDB-specific connector name. Trino renamed this to "hive";
# putting "hive" here in PrestoDB fails with "no factory for connector 'hive'".
connector.name=hive-hadoop2

# Talk to the Hive Metastore over Thrift (declared in docker-compose).
hive.metastore.uri=thrift://hive-metastore:9083

# Inherit HDFS config from the same XML files Spark uses — single source of
# truth for fs.defaultFS, replication, etc.
hive.config.resources=/etc/hadoop/conf/core-site.xml,/etc/hadoop/conf/hdfs-site.xml

# Allow ad-hoc INSERT INTO into external tables (i.e. tables registered against
# pre-existing HDFS Parquet via CREATE EXTERNAL TABLE). Default refuses these.
hive.non-managed-table-writes-enabled=true

# Match Parquet columns by name rather than ordinal. Saves us when Spark
# writes columns in a different order than the Hive DDL declares.
hive.parquet.use-column-names=true
