# Single-node coordinator that also acts as a worker.
# Production deployments split coordinator + workers; for class-project scale
# we collapse them via node-scheduler.include-coordinator=true.
coordinator=true
node-scheduler.include-coordinator=true
http-server.http.port=8080
discovery-server.enabled=true
discovery.uri=http://localhost:8080

# Per-query memory caps tuned for an 8 GB Docker allocation, where Presto
# shares the host with Pinot, Spark, Kafka, etc. Heap is 1 GB (jvm.config).
# Presto enforces:
#     query.max-total-memory-per-node + memory.heap-headroom-per-node <= heap
# heap-headroom defaults to 30% of heap (~307 MB), so max-total must be
# below ~720 MB. Bump these (and jvm.config -Xmx) if you give Docker more
# memory and want bigger queries.
query.max-memory=512MB
query.max-memory-per-node=512MB
query.max-total-memory-per-node=512MB
