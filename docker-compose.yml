name: finpulse

# Local stack for FinPulse Fraud project.
#   HDFS  : NameNode + 2 DataNodes  (UI :9870)
#   Spark : Master + 2 Workers      (UI :8080,  master rpc :7077)
#   Kafka : single broker, KRaft    (host :9092, internal kafka:9094)
#   Kafdrop                          (UI :9001)
#   Airflow + Postgres              (UI :8081  user/pass admin/admin)
#
# All images are multi-arch (work on Apple Silicon).

networks:
  finpulse:
    driver: bridge

volumes:
  hdfs-name:
  hdfs-data-1:
  hdfs-data-2:
  kafka-data:
  postgres-data:

# -----------------------------------------------------------------------------
# Shared blocks
# -----------------------------------------------------------------------------

# Hadoop config is delivered via bind-mounted XML files in
# ./docker/hadoop-server (server side: NN + DNs) and ./docker/hadoop-client
# (Spark workers). We do NOT use the apache/hadoop env-var-to-XML translator
# because farberg/apache-hadoop:3.4.1 ships without it, and we want one
# config story across both images.

x-airflow-common: &airflow-common
  image: apache/airflow:2.10.4-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: dev-secret-key-change-me
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./jobs:/opt/jobs:ro
  user: "50000:0"
  networks: [finpulse]

# -----------------------------------------------------------------------------
# Services
# -----------------------------------------------------------------------------

services:

  # ---------- HDFS ----------------------------------------------------------
  # NOTE on image choice (farberg/apache-hadoop vs apache/hadoop):
  #   The official `apache/hadoop` image is amd64-only — Apache does not
  #   publish arm64 builds for any tag. Running it on Apple Silicon forces
  #   Rosetta/QEMU emulation which slows the JVM ~30-50%. `farberg/apache-hadoop`
  #   is a community fork that rebuilds the *same* upstream Hadoop release
  #   natively for arm64 + amd64; it inherits the `apache/hadoop` entrypoint
  #   and env-var -> XML config translator, so HDFS-SITE.XML_* env vars work
  #   identically. Pinned to 3.4.1 because that is the closest multi-arch tag
  #   to what `apache/hadoop:3.3.6` would have given us.
  #   Trade-off: community image, single maintainer. Acceptable for a class
  #   project; revisit if Apache ever publishes arm64 hadoop builds.
  namenode:
    image: farberg/apache-hadoop:3.4.1
    container_name: namenode
    hostname: namenode
    user: root
    command:
      - bash
      - -c
      - |
        if [ ! -d /hadoop/dfs/name/current ]; then
          echo "Formatting NameNode..."
          hdfs namenode -format -nonInteractive -clusterId finpulse
        fi
        exec hdfs namenode
    ports:
      - "9870:9870"   # NameNode web UI
      - "9000:9000"   # NameNode RPC
    volumes:
      - hdfs-name:/hadoop/dfs/name
      - ./docker/hadoop-server/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./docker/hadoop-server/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
      - ./docker/hadoop-server/log4j.properties:/opt/hadoop/etc/hadoop/log4j.properties:ro
    networks: [finpulse]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9870/ > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  datanode-1:
    image: farberg/apache-hadoop:3.4.1
    container_name: datanode-1
    hostname: datanode-1
    user: root
    command: ["hdfs", "datanode"]
    depends_on:
      namenode:
        condition: service_healthy
    volumes:
      - hdfs-data-1:/hadoop/dfs/data
      - ./docker/hadoop-server/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./docker/hadoop-server/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
      - ./docker/hadoop-server/log4j.properties:/opt/hadoop/etc/hadoop/log4j.properties:ro
    networks: [finpulse]

  datanode-2:
    image: farberg/apache-hadoop:3.4.1
    container_name: datanode-2
    hostname: datanode-2
    user: root
    command: ["hdfs", "datanode"]
    depends_on:
      namenode:
        condition: service_healthy
    volumes:
      - hdfs-data-2:/hadoop/dfs/data
      - ./docker/hadoop-server/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./docker/hadoop-server/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
      - ./docker/hadoop-server/log4j.properties:/opt/hadoop/etc/hadoop/log4j.properties:ro
    networks: [finpulse]

  # ---------- Spark ---------------------------------------------------------
  # apache/spark images are bare-bones: we provide explicit master/worker
  # commands instead of relying on Bitnami's init script.
  spark-master:
    image: apache/spark:3.5.3-python3
    container_name: spark-master
    hostname: spark-master
    user: root              # write events / logs under mounted volumes
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    environment:
      - HADOOP_CONF_DIR=/opt/hadoop-conf
      - SPARK_NO_DAEMONIZE=true
    ports:
      - "8080:8080"   # Master UI
      - "7077:7077"   # Master RPC
    volumes:
      - ./jobs:/opt/jobs
      - ./docker/hadoop-client:/opt/hadoop-conf:ro
      - ./docker/spark/log4j2.properties:/opt/spark/conf/log4j2.properties:ro
    networks: [finpulse]

  spark-worker-1:
    image: apache/spark:3.5.3-python3
    container_name: spark-worker-1
    hostname: spark-worker-1
    user: root
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - --cores
      - "2"
      - --memory
      - 2g
      - --webui-port
      - "8081"
      - spark://spark-master:7077
    environment:
      - HADOOP_CONF_DIR=/opt/hadoop-conf
      - SPARK_NO_DAEMONIZE=true
    depends_on: [spark-master]
    volumes:
      - ./jobs:/opt/jobs
      - ./docker/hadoop-client:/opt/hadoop-conf:ro
      - ./docker/spark/log4j2.properties:/opt/spark/conf/log4j2.properties:ro
    networks: [finpulse]

  spark-worker-2:
    image: apache/spark:3.5.3-python3
    container_name: spark-worker-2
    hostname: spark-worker-2
    user: root
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - --cores
      - "2"
      - --memory
      - 2g
      - --webui-port
      - "8081"
      - spark://spark-master:7077
    environment:
      - HADOOP_CONF_DIR=/opt/hadoop-conf
      - SPARK_NO_DAEMONIZE=true
    depends_on: [spark-master]
    volumes:
      - ./jobs:/opt/jobs
      - ./docker/hadoop-client:/opt/hadoop-conf:ro
      - ./docker/spark/log4j2.properties:/opt/spark/conf/log4j2.properties:ro
    networks: [finpulse]

  # ---------- Kafka ---------------------------------------------------------
  # Official apache/kafka image: env vars are KAFKA_<KEY> (no _CFG_ infix).
  # Single-broker KRaft, so internal topic replication factors must be 1.
  kafka:
    image: apache/kafka:3.7.1
    container_name: kafka
    hostname: kafka
    user: "0:0"     # let entrypoint chown the named volume on first boot
    ports:
      - "9092:9092"   # external client (host)
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=INTERNAL://:9094,CONTROLLER://:9093,EXTERNAL://:9092
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:9094,EXTERNAL://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
      # Single-broker safety: replication/ISR must be 1 or topics fail to create.
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      # CLUSTER_ID is auto-generated on first format if unset.
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks: [finpulse]
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:9094 > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  kafdrop:
    # 4.0.1 ships amd64 only; :latest is multi-arch (last verified Apr 2026).
    # Pin to a digest if you need reproducibility.
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop
    ports:
      - "9001:9000"   # UI on host :9001 (9000 is taken by HDFS RPC)
    environment:
      KAFKA_BROKERCONNECT: kafka:9094
    depends_on:
      kafka:
        condition: service_healthy
    networks: [finpulse]

  # ---------- Airflow -------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 10
    networks: [finpulse]

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@finpulse.local || true
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: unless-stopped
